<!DOCTYPE html>
<html>
<head>
    <title>ReadwithUs - Login</title>
    <style>
        body { background: url("https://images.stockcake.com/public/c/d/a/cda0dc0a-97a1-489e-9dbe-268aaf096c9e_large/infinite-library-portal-stockcake.jpg") center/cover fixed; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(255, 255, 255, 0.8); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.3); width: 300px; }
        h1 { color: rgb(152, 13, 13); }
        .btn { display: block; width: 220px; padding: 12px; margin: 15px auto; background-color: rgb(152, 13, 13); color: white; text-decoration: none; border-radius: 25px; font-weight: bold; cursor: pointer; border: none; }
        .btn:hover { background-color: #5a0707; }
        input { padding: 10px; border-radius: 10px; border: 1px solid #ccc; width: 200px; margin-bottom: 10px; text-align: center; }
        /* Style para sa Teacher Link */
        .teacher-link { color: #555; font-size: 12px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>ReadwithUs</h1>
        <input type="text" id="studentName" placeholder="Enter your name...">
        <p id="status" style="color:#333; font-weight:600; margin-top:8px;"> </p>
        <button class="btn" onclick="saveStudent()">Student Sign In</button>
        <p class="teacher-link" onclick="checkTeacher()">Teacher Access</p>
    </div>

    <script>
        function saveStudent() {
            let input = document.getElementById('studentName');
            let name = (input.value || '').trim();
            if (name === '') {
                alert('Please enter your name!');
                input.focus();
                return;
            }
            try {
                localStorage.setItem('currentUser', name);
                document.getElementById('status').innerText = 'Signed in as: ' + name;
                // use replace so back button won't return to login
                window.location.replace('index.html');
            } catch (err) {
                alert('Could not save name to localStorage: ' + err.message);
            }
        }

        function checkTeacher() {
            let pass = prompt('Enter Teacher Access Code:');
            if (pass === 'admin123') {
                window.location.href = 'teacher-login.html';
            } else {
                alert('Invalid Code!');
            }
        }

        // show existing saved name (if any) so user can confirm
        function showSavedName() {
            try {
                let name = localStorage.getItem('currentUser');
                if (name) {
                    document.getElementById('studentName').value = name;
                    document.getElementById('status').innerText = 'Signed in as: ' + name;
                } else {
                    document.getElementById('status').innerText = '';
                }
            } catch (e) {
                document.getElementById('status').innerText = '';
            }
        }

        document.addEventListener('DOMContentLoaded', showSavedName);
    </script>
</body>
</html>
