<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#961313">
    <meta name="description" content="Login to ReadwithUs for students and teachers.">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="192x192" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ReadwithUs - Login</title>
    <style>
        body { background: url("https://images.stockcake.com/public/c/d/a/cda0dc0a-97a1-489e-9dbe-268aaf096c9e_large/infinite-library-portal-stockcake.jpg") center/cover scroll; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .login-card { background: rgba(255, 255, 255, 0.92); padding: 36px; border-radius: 22px; text-align: center; box-shadow: 0 0 28px rgba(0,0,0,0.22); width: 360px; max-width: 100%; }
        h1 { color: rgb(152, 13, 13); font-size: clamp(1.8rem, 4vw, 2.4rem); margin-bottom: 20px; }
        .btn { display: block; width: 100%; max-width: 100%; padding: 14px; margin: 15px auto; background-color: rgb(152, 13, 13); color: white; text-decoration: none; border-radius: 25px; font-weight: bold; cursor: pointer; border: none; box-sizing: border-box; }
        .btn:hover { background-color: #5a0707; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #ccc; width: 100%; max-width: 100%; margin-bottom: 10px; text-align: center; box-sizing: border-box; }
        .teacher-link { color: #555; font-size: 12px; cursor: pointer; text-decoration: underline; }
        @media (max-width: 760px) {
            body { padding: 16px; align-items: flex-start; }
            .login-card { padding: 28px; }
            input { width: 100%; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>ReadwithUs</h1>
        <input type="text" id="studentName" placeholder="Enter your name (press Enter or click Sign In)..." autofocus onkeydown="if(event.key==='Enter'){ saveStudent(); }">
        <p id="status" style="color:#333; font-weight:600; margin-top:8px;"> </p>
        <button type="button" class="btn" onclick="saveStudent()">Student Sign In</button>
        <p class="teacher-link" onclick="checkTeacher()">Teacher Access</p>
    </div>

    <script>
        function saveStudent() {
            let input = document.getElementById('studentName');
            let name = (input.value || '').trim();
            if (name === '') {
                alert('Please enter your name!');
                input.focus();
                return;
            }
            try {
                localStorage.setItem('currentUser', name);
                document.getElementById('status').innerText = 'Signed in as: ' + name;
                window.location.replace('index.html');
            } catch (err) {
                alert('Could not save name to localStorage: ' + err.message);
            }
        }

        function checkTeacher() {
            let pass = prompt('Enter Teacher Access Code:');
            if (pass === 'admin123') {
                window.location.href = 'teacher-login.html';
            } else {
                alert('Invalid Code!');
            }
        }

        function showSavedName() {
            try {
                let name = localStorage.getItem('currentUser');
                if (name) {
                    document.getElementById('studentName').value = name;
                    document.getElementById('status').innerText = 'Signed in as: ' + name;
                } else {
                    document.getElementById('status').innerText = '';
                }
            } catch (e) {
                document.getElementById('status').innerText = '';
            }
        }

        document.addEventListener('DOMContentLoaded', showSavedName);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').catch(function() {});
            });
        }
    </script>
</body>
</html>
