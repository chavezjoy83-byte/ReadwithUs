<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadwithUs - Poetry & Vocab Lesson</title>
    <style>
        body { 
            background: linear-gradient(135deg, #1a1a2e, #16213e); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; color: #e9ecef;
        }

        .main-wrapper {
            display: flex; gap: 30px; align-items: stretch; justify-content: center;
            max-width: 950px; padding: 20px;
        }

        /* Container na may umiikot na ilaw */
        .glow-box {
            position: relative;
            background: #1a1a2e;
            border-radius: 25px;
            padding: 40px;
            overflow: hidden;
            width: 400px;
        }

        /* Ito ang effect na umiikot na ilaw */
        .glow-box::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, #6c5ce7, transparent, #6c5ce7);
            animation: rotate 4s linear infinite;
        }

        /* Inner background para hindi matakpan ang content */
        .glow-box::after {
            content: "";
            position: absolute;
            inset: 4px;
            background: #1a1a2e;
            border-radius: 22px;
        }

        .content-box { position: relative; z-index: 1; }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .btn { padding: 12px 25px; background: #6c5ce7; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        .btn:hover { background: #5a4ad1; }
        
        h2 { color: #ffffff; margin-top: 5px; }
        .category { font-weight: 800; color: #a29bfe; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 2px; }
        #full-example { font-style: italic; color: #cfcfcf; line-height: 1.8; white-space: pre-line; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Definition Card -->
    <div class="glow-box">
        <div class="content-box" id="slide">
            <div class="category" id="category">Lesson Category</div>
            <div class="label" id="label" style="color: #a29bfe; font-size: 0.75rem;">Sub-Topic</div>
            <h2 id="title">Loading...</h2>
            <p id="meaning" style="font-size: 1.1rem;"></p>
        </div>
    </div>

    <!-- Poetry & Vocab Panel -->
    <div class="glow-box">
        <div class="content-box" id="poetry-panel">
            <strong style="color: #6c5ce7; display: block; margin-bottom: 10px;">Example / Context:</strong>
            <p id="full-example"></p>
        </div>
    </div>
</div>

<div class="controls">
    <button class="btn" onclick="prevSlide()">← Back</button>
    <button class="btn" onclick="nextSlide()">Next →</button>
    <a href="index.html" class="btn" style="text-decoration:none; background: #00b894;">Home</a>
</div>

<script>
    const content = [
        { cat: "Introduction", label: "Poetry Basics", title: "What is Poetry?", meaning: "Poetry is a form of literature that uses rhythmic and aesthetic qualities of language to evoke meanings.", example: "Poetry is the spontaneous overflow of powerful feelings: it takes its origin from emotion recollected in tranquility." },
        { cat: "Poetry Styles", label: "Style 1", title: "Lyric Poetry", meaning: "Focuses on emotions and feelings. It is personal, musical, and melodic.", example: "Pag-ibig sa Tinubuang Lupa (Andres Bonifacio):\n\nAling pag-ibig pa ang hihigit kaya\nsa pagkadalisay at pagkadakila\ngaya ng pag-ibig sa tinubuang lupa?" },
        { cat: "Poetry Styles", label: "Style 2", title: "Narrative Poetry", meaning: "A poem that tells a story, often making use of characters and a plot.", example: "Ibong Adarna (Epiko):\n\nO, Birheng kaibig-ibig\nIna naming nasa langit,\nliwanagan yaring isip\nnang sa layo'y di malihis." },
        { cat: "Poetry Styles", label: "Style 3", title: "Dramatic Poetry", meaning: "Poetry written for the stage, where characters reveal their personality through speech.", example: "Florante at Laura (Balagtas):\n\nSa loob at labas ng bayan kong sawi,\nkaliluha'y siyang nangyayaring hari,\nkagalingan at bait ay nalulugami." },
        { cat: "Vocabulary Knowledge", label: "Type 1", title: "Receptive Vocabulary", meaning: "Words you can understand when you hear or read them, but don't use often.", example: "Example: You hear the word 'hapis' in a song and understand it means sadness, even if you don't use it in your daily talk." },
        { cat: "Vocabulary Knowledge", label: "Type 2", title: "Productive Vocabulary", meaning: "Words you are able to use correctly in your own speech and writing.", example: "Example: You consciously use the word 'marikit' to describe a beautiful sunset in your own essay." },
        { cat: "Vocabulary Knowledge", label: "Type 3", title: "Depth of Word Knowledge", meaning: "Understanding the word's nuances, context, and associations.", example: "Example: Knowing that 'apoy' is not just 'fire' but can also represent 'passion', 'rage', or 'courage' depending on the situation." }
    ];

    let current = 0;

    function update() {
        document.getElementById("category").innerText = content[current].cat;
        document.getElementById("label").innerText = content[current].label;
        document.getElementById("title").innerText = content[current].title;
        document.getElementById("meaning").innerText = content[current].meaning;
        document.getElementById("full-example").innerText = content[current].example;
    }

    function nextSlide() { if(current < content.length - 1) { current++; update(); } }
    function prevSlide() { if(current > 0) { current--; update(); } }

    update();
</script>
</body>
</html>
