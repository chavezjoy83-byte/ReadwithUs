<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#961313">
    <meta name="description" content="A mobile-friendly interactive reading and vocabulary website.">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="192x192" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
        if (!localStorage.getItem('currentUser')) {
            window.location.href = 'login.html';
        }
    </script>
    <title>ReadwithUs</title>
    <style>
        body {
            background-image: url("https://images.stockcake.com/public/c/d/a/cda0dc0a-97a1-489e-9dbe-268aaf096c9e_large/infinite-library-portal-stockcake.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: scroll;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #111;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 22px;
            border-radius: 18px;
            max-width: 600px;
            width: min(100%, 560px);
            text-align: center;
            transition: 0.4s;
            border: 2px solid transparent;
            margin-bottom: 24px;
            box-sizing: border-box;
        }

        .content-box:hover {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.15);
            border: 2px solid rgb(152, 13, 13);
        }

        h1 {
            color: rgb(152, 13, 13);
            margin-top: 0;
            font-size: clamp(1.6rem, 3vw, 2.4rem);
        }

        .content-box p {
            margin: 0;
            line-height: 1.6;
            font-size: 1rem;
            color: #333;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: min(100%, 360px);
            max-width: 100%;
        }

        .nav-btn {
            padding: 14px 20px;
            font-size: 16px;
            background-color: rgb(152, 13, 13);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            max-width: 100%;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            box-sizing: border-box;
        }

        .nav-btn:hover {
            background-color: white;
            color: rgb(152, 13, 13);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            transform: scale(1.02);
        }
        .hidden { display: none; }

        @media (max-width: 760px) {
            body { padding: 16px; }
            .content-box { padding: 18px; }
            .button-container { gap: 14px; }
            .nav-btn { padding: 14px 16px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <h1 id="welcomeUser">Welcome!</h1>

    <div class="content-box">
        <h1>ReadwithUs</h1>
        <p>ReadwithUs is an interactive, web-based educational tool currently under development to support literacy and reading comprehension.</p>
    </div>

    <div class="button-container">
        <a href="flashcards.html" class="nav-btn">Flashcard</a>
        <a href="quiz.html" class="nav-btn">Drill</a>
        <a href="lesson.html" class="nav-btn">Lesson Proper</a>
        <a href="poem.html" class="nav-btn">Philippine Poem</a>
        <a href="activity.html" class="nav-btn">Group Activity</a>
        <a href="teacher-login.html" class="nav-btn">Track Records</a>
    </div>
    <button id="installButton" class="nav-btn hidden" onclick="promptInstall()">Install ReadwithUs</button>
    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            window.dispatchEvent(new CustomEvent('pwaInstallReady'));
        });

        window.addEventListener('load', function() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(function() {});
            }
        });

        window.addEventListener('pwaInstallReady', function() {
            const installBtn = document.getElementById('installButton');
            if (installBtn) installBtn.classList.remove('hidden');
        });

        function promptInstall() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function() {
                deferredPrompt = null;
                const installBtn = document.getElementById('installButton');
                if (installBtn) installBtn.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
